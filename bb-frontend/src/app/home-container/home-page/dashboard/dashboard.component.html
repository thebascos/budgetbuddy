<div class="dashboard">
  <div class="dash-card dash-expenses">
    <div class="card-header">
      <mat-icon class="card-icon">receipt</mat-icon>
      <h2 class="card-title">Expenses</h2>
    </div>
    <div class="pie-chart" *ngIf="budgets">
      <app-pie-chart></app-pie-chart>
    </div>
    <div class="card-stat">
      <span class="stat-label">Total this month</span>
      <span class="stat-value">
        {{ getTotalExpenses() | currency : "PHP" : "symbol" : "1.2-2" }}
      </span>
    </div>
  </div>

  <div class="dash-card dash-income">
    <div class="card-header">
      <mat-icon class="card-icon icon-teal">trending_up</mat-icon>
      <h2 class="card-title">Total Net Income</h2>
    </div>
    <div class="income-display">
      <span class="income-amount">
        {{ totalIncomes | currency : "PHP" : "symbol" : "1.2-2" }}
      </span>
    </div>
  </div>

  <div class="dash-card dash-bills">
    <div class="card-header">
      <mat-icon class="card-icon icon-amber">payment</mat-icon>
      <h2 class="card-title">Upcoming Bills</h2>
    </div>
    <div class="bills-list">
      <div class="bill-row" *ngFor="let bill of filterBillsDueThisMonth()">
        <div class="bill-check">
          <input type="checkbox" [(ngModel)]="bill.isPaid" disabled />
        </div>
        <span class="bill-name">{{ bill.biller }}</span>
        <span class="bill-amount">
          {{ bill.amount | currency : "PHP" : "symbol" : "1.2-2" }}
        </span>
      </div>
    </div>
  </div>
</div>
