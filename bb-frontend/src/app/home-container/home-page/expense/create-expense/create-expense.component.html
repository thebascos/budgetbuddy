<div class="custom-dialog">
  <h2 class="form-header">Create Expense</h2>
  <form [formGroup]="expenseForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="description" class="form-label">Description</label>
      <input type="text" id="description" formControlName="description" class="form-input" placeholder="What did you spend on?" />
    </div>
    <div class="form-group">
      <label for="amount" class="form-label">Amount</label>
      <input type="number" id="amount" formControlName="amount" class="form-input" placeholder="0.00" />
    </div>
    <div class="form-group">
      <label class="form-label">Attachment</label>
      <app-file-upload (fileUploaded)="onFileUploaded($event)"></app-file-upload>
    </div>
    <div class="form-group">
      <label class="form-label">Budget</label>
      <mat-form-field>
        <mat-select formControlName="budgetId">
          <mat-option *ngFor="let budget of budgets" [value]="budget.id">
            {{ budget.description }}
          </mat-option>
        </mat-select>
      </mat-form-field>
    </div>
    <button type="submit" [disabled]="!expenseForm.valid" class="form-button">
      Create Expense
    </button>
  </form>
</div>
