<div class="page-header">
  <h1 class="page-title">Savings Plan</h1>
  <button class="btn-create" mat-button (click)="openCreateBudgetDialog()">
    <mat-icon>add</mat-icon>
    Create Savings Plan
  </button>
</div>

<div class="card-grid">
  <div class="item-card" *ngFor="let saving of savings; let i = index"
       [style.animation-delay]="i * 60 + 'ms'">
    <h3 class="item-title">{{ saving.goal }}</h3>

    <div class="progress-section">
      <div class="progress-bar-track">
        <div class="progress-bar-fill"
             [style.width]="(saving.total / saving.goal_amount * 100) + '%'">
        </div>
      </div>
      <span class="progress-text">
        {{ saving.total / saving.goal_amount * 100 | number:'1.0-0' }}%
      </span>
    </div>

    <div class="item-stat">
      <span class="item-stat-label">Goal</span>
      <span class="item-stat-value">
        {{ saving.goal_amount | currency : "PHP" : "symbol" : "1.2-2" }}
      </span>
    </div>
    <div class="item-stat">
      <span class="item-stat-label">Saved</span>
      <span class="item-stat-value value-positive">
        {{ saving.total | currency : "PHP" : "symbol" : "1.2-2" }}
      </span>
    </div>

    <button class="btn-toggle" (click)="toggleInlineInput(saving)">
      {{ saving.showInlineInput ? "Cancel" : "Add Saving" }}
    </button>

    <div *ngIf="saving.showInlineInput" class="inline-form">
      <form [formGroup]="addSaving" (ngSubmit)="onSubmit(saving)">
        <div class="inline-fields">
          <input
            type="number"
            matInput
            formControlName="amount"
            placeholder="Amount"
            required
            class="field-input"
          />
          <select formControlName="incomeId" class="field-input">
            <option *ngFor="let income of incomes" [value]="income.id">
              {{ income.source }}
            </option>
          </select>
          <button type="submit" class="btn-create">Submit</button>
        </div>
      </form>
    </div>
  </div>
</div>
