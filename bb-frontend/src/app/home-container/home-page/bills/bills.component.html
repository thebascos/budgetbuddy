<div class="page-header">
  <h1 class="page-title">Bills</h1>
  <button class="btn-create" (click)="openCreateBillDialog()" >
    <mat-icon>add</mat-icon>
    Add Bill
  </button>
</div>

<div class="filter-bar">
  <span class="filter-label">Show:</span>
  <label class="filter-chip">
    <input type="checkbox" [(ngModel)]="showUnpaid" />
    <span class="chip-text">Unpaid</span>
  </label>
  <label class="filter-chip">
    <input type="checkbox" [(ngModel)]="showPaid" />
    <span class="chip-text">Paid</span>
  </label>
</div>

<div class="card-grid">
  <div class="item-card"
       *ngFor="let bill of bills | billFilter : showUnpaid : showPaid; let i = index"
       [style.animation-delay]="i * 60 + 'ms'"
       aria-label="card">
    <div class="bill-status" *ngIf="!bill.isPaid">
      <span class="status-due">Due: {{ formatDueDate(bill.dueDay) }}</span>
    </div>
    <div class="bill-status" *ngIf="bill.isPaid">
      <span class="status-paid">Paid</span>
    </div>
    <h3 class="item-title">{{ bill.biller }}</h3>
    <div class="item-stat">
      <span class="item-stat-label">Amount</span>
      <span class="item-stat-value">
        {{ bill.amount | currency : currency : "symbol" : "1.2-2" }}
      </span>
    </div>
    <button
      *ngIf="!bill.isPaid"
      class="btn-pay"
      (click)="payForBill(bill)"
    >
      Mark as Paid
    </button>
  </div>
</div>
