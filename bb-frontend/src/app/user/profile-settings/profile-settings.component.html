<div class="custom-dialog">
  <h2 class="form-header">Edit Profile</h2>
  <form (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="name" class="form-label">Name</label>
      <input
        matInput
        type="text"
        id="name"
        name="name"
        [(ngModel)]="user.name"
        required
        class="form-input"
      />
    </div>
    <div class="form-group">
      <label for="email" class="form-label">Email</label>
      <input
        matInput
        type="email"
        id="email"
        name="email"
        [(ngModel)]="user.email"
        required
        class="form-input"
        readonly
      />
    </div>
    <div class="form-group">
      <label for="password" class="form-label">Password</label>
      <input
        matInput
        type="password"
        id="password"
        name="password"
        [(ngModel)]="user.password"
        required
        class="form-input"
        readonly
      />
    </div>
    <button type="submit" mat-raised-button class="form-button">
      Update Profile
    </button>
    <div class="error-message" *ngIf="errorMessage">{{ errorMessage }}</div>
  </form>
</div>
