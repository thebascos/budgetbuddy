<div class="signup-container">
  <h2 class="signup-title">Create account</h2>
  <p class="signup-subtitle">Start managing your finances today</p>
  <form [formGroup]="signUpForm" (ngSubmit)="onSignUp()">
    <div class="field">
      <label for="signupName" class="field-label">Name</label>
      <input
        type="text"
        id="signupName"
        formControlName="name"
        required
        placeholder="Your full name"
        class="field-input"
      />
    </div>
    <div class="field">
      <label for="signupEmail" class="field-label">Email</label>
      <input
        type="email"
        id="signupEmail"
        formControlName="email"
        required
        placeholder="you@example.com"
        class="field-input"
      />
    </div>
    <div class="field">
      <label for="signupPassword" class="field-label">Password</label>
      <input
        type="password"
        id="signupPassword"
        formControlName="password"
        placeholder="Choose a password"
        required
        class="field-input"
      />
    </div>
    <button type="submit" class="btn-primary" (click)="onSignUp()">Sign Up</button>
  </form>
  <div class="error-message" *ngIf="errorMessage">{{ errorMessage }}</div>
</div>

<div class="error-message" *ngIf="errorMessage">{{ errorMessage }}</div>
